name: Terraform

on:
    pull_request:
        paths:
            - "terraform/**"
    push:
        branches: [main]
        paths:
            - "terraform/**"
    workflow_dispatch:

permissions:
    id-token: write
    contents: read
    pull-requests: write

defaults:
    run:
        working-directory: terraform

jobs:
    plan:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_TF_PLAN_ROLE_ARN }}
                  aws-region: ap-northeast-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Init
              run: terraform init

            - name: Format check
              run: terraform fmt -check -recursive

            - name: Validate
              run: terraform validate

            - name: Plan
              id: plan
              run: terraform plan -no-color -input=false | tee plan.txt
              continue-on-error: true

            - name: Comment plan on PR
              uses: actions/github-script@v7
              env:
                  PLAN_OUTCOME: ${{ steps.plan.outcome }}
              with:
                  script: |
                      const fs = require('fs');
                      let plan = fs.readFileSync('terraform/plan.txt', 'utf8');
                      const max = 60000;
                      if (plan.length > max) plan = plan.slice(0, max) + '\n... (output truncated)';
                      const body = [
                        `#### Terraform Plan: \`${process.env.PLAN_OUTCOME}\``,
                        '<details><summary>Show plan</summary>',
                        '',
                        '```hcl',
                        plan,
                        '```',
                        '</details>',
                      ].join('\n');
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.startsWith('#### Terraform Plan'));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Fail if plan errored
              if: steps.plan.outcome == 'failure'
              run: exit 1

    apply:
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_TF_APPLY_ROLE_ARN }}
                  aws-region: ap-northeast-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Init
              run: terraform init

            - name: Apply
              run: terraform apply -auto-approve -input=false
