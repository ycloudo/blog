name: CI

on:
    pull_request:
        paths:
            - "content/**"
            - "config.yml"
            - "static/**"
            - "themes/**"
            - "terraform/**"

permissions:
    id-token: write
    contents: read
    pull-requests: write

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            site: ${{ steps.filter.outputs.site }}
            tf: ${{ steps.filter.outputs.tf }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Detect changed paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      site:
                        - 'content/**'
                        - 'config.yml'
                        - 'static/**'
                        - 'themes/**'
                      tf:
                        - 'terraform/**'

    build-check:
        needs: changes
        if: needs.changes.outputs.site == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: latest
                  extended: true

            - name: Build (check only, no deploy)
              run: hugo --minify

    tf-plan:
        needs: changes
        if: needs.changes.outputs.tf == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: terraform
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_TF_PLAN_ROLE_ARN }}
                  aws-region: ap-northeast-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Init
              run: terraform init

            - name: Format check
              run: terraform fmt -check -recursive

            - name: Validate
              run: terraform validate

            - name: Plan
              id: plan
              run: terraform plan -no-color -input=false | tee plan.txt
              continue-on-error: true

            - name: Comment plan on PR
              uses: actions/github-script@v7
              env:
                  PLAN_OUTCOME: ${{ steps.plan.outcome }}
              with:
                  script: |
                      const fs = require('fs');
                      let plan = fs.readFileSync('terraform/plan.txt', 'utf8');
                      const max = 60000;
                      if (plan.length > max) plan = plan.slice(0, max) + '\n... (output truncated)';
                      const body = [
                        `#### Terraform Plan: \`${process.env.PLAN_OUTCOME}\``,
                        '<details><summary>Show plan</summary>',
                        '',
                        '```hcl',
                        plan,
                        '```',
                        '</details>',
                      ].join('\n');
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.startsWith('#### Terraform Plan'));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Fail if plan errored
              if: steps.plan.outcome == 'failure'
              run: exit 1
