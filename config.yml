baseURL: "https://ycloudo.com/"
title: "Cloudo's Blog"
languageCode: "zh-TW"
locale: "zh-tw"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
    disableXML: true
    minifyOutput: true

params:
    env: production
    title: "Cloudo's Blog"
    description: "Personal blog — notes, learnings, and documentation."
    author: "ycloudo"
    canonicalURL: true

    defaultTheme: white
    disableThemeToggle: false

    ShowReadingTime: true
    ShowShareButtons: false
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowWordCount: false
    ShowRssButtonInSectionTermList: true
    UseHugoToc: true
    disableSpecial1stPost: false
    disableScrollToTop: false
    hidemeta: false
    hideSummary: false
    showtoc: true
    tocopen: false

    homeInfoParams:
        Title: "Hi, I'm Yun Cheng Yao"
        Content: "軟體工程"

    socialIcons:
        - name: linkedin
          url: https://www.linkedin.com/in/cloudo

    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        limit: 10
        keys: ["title", "permalink", "summary", "content"]

menu:
    main:
        - identifier: search
          name: Search
          url: /search/
          weight: 10
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: about
          name: About
          url: /about/
          weight: 40

taxonomies:
    category: categories
    tag: tags

sitemap:
    changefreq: "weekly"
    priority: 0.5
    filename: "sitemap.xml"

outputs:
    home:
        - HTML
        - RSS
        - JSON
